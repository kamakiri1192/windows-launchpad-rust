name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.89.0
  TARGET: x86_64-pc-windows-msvc
  TARGET_CACHE_PATH: target

jobs:
  windows-binary:
    name: Build and attach Windows binary
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal --target $env:TARGET
          rustup default $env:RUST_VERSION

      - name: Restore GitHub target cache
        id: target-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.TARGET_CACHE_PATH }}
          key: windows-target-release-${{ env.TARGET }}-rust-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'src/**/*.rs', 'src/**/*.wgsl', 'assets/shaders/**/*.wgsl') }}
          restore-keys: |
            windows-target-release-${{ env.TARGET }}-rust-${{ env.RUST_VERSION }}-

      - name: Cache Cargo registry and git sources
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Build release binary
        run: cargo build --release --locked --target $env:TARGET

      - name: Lookup GitHub target cache before save
        id: target-cache-before-save
        if: success() && steps.target-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.TARGET_CACHE_PATH }}
          key: ${{ steps.target-cache.outputs.cache-primary-key }}
          lookup-only: true

      - name: Save GitHub target cache
        if: success() && steps.target-cache.outputs.cache-hit != 'true' && steps.target-cache-before-save.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.TARGET_CACHE_PATH }}
          key: ${{ steps.target-cache.outputs.cache-primary-key }}

      - name: Package binary
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}" -replace '[\\/:*?"<>|]', '-'
          $dist = "dist"
          $assetPath = "$dist/launchpad-windows-$tag-windows-x86_64.zip"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "target\$env:TARGET\release\launchpad-windows.exe" "$dist\launchpad-windows.exe"
          Compress-Archive -Path "$dist\launchpad-windows.exe" -DestinationPath $assetPath -Force
          Add-Content -Path $env:GITHUB_OUTPUT -Value "asset_path=$assetPath"

      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset_path }}

  macos-application:
    name: Build and attach macOS application
    runs-on: macos-14
    timeout-minutes: 30
    env:
      TARGET: aarch64-apple-darwin
      BIN_NAME: launchpad-windows
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --target "$TARGET"
          rustup default "$RUST_VERSION"

      - name: Cache Cargo registry and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-release-${{ env.TARGET }}

      - name: Build release application
        run: cargo build --release --locked --target "$TARGET" --bin "$BIN_NAME"

      - name: Package application bundle
        id: package
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          safe_tag="$(printf '%s' "$RELEASE_TAG" | tr '/:*?"<>|' '-')"
          asset_name="$BIN_NAME-$safe_tag-macos-arm64"
          app_dir="dist/$asset_name/Launchpad.app"
          contents="$app_dir/Contents"
          mkdir -p "$contents/MacOS" "$contents/Frameworks" "$contents/Resources"
          cp "target/$TARGET/release/$BIN_NAME" "$contents/MacOS/$BIN_NAME"
          cp assets/macos/Info.plist "$contents/Info.plist"

          version="${RELEASE_TAG#v}"
          if [[ "$version" =~ ^[0-9]+([.][0-9]+){1,2}([+-][0-9A-Za-z.-]+)?$ ]]; then
            plutil -replace CFBundleShortVersionString -string "$version" "$contents/Info.plist"
          fi
          plutil -replace CFBundleVersion -string "$GITHUB_RUN_NUMBER" "$contents/Info.plist"

          cat > "$contents/Resources/BUILD_INFO.txt" <<EOF
          Repository: $GITHUB_REPOSITORY
          Workflow: $GITHUB_WORKFLOW
          Release: $RELEASE_TAG
          Commit: $GITHUB_SHA
          Target: $TARGET
          Built at UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Signing: ad-hoc

          If Gatekeeper retains the downloaded archive quarantine, run:
            xattr -dr com.apple.quarantine Launchpad.app
          EOF

          xcrun swift-stdlib-tool \
            --copy \
            --scan-executable "$contents/MacOS/$BIN_NAME" \
            --destination "$contents/Frameworks" \
            --platform macosx \
            --strip-bitcode

          find "$contents/Frameworks" -type f -name '*.dylib' -exec codesign --force --sign - {} \;
          codesign --force --deep --sign - "$app_dir"
          codesign --verify --deep --strict "$app_dir"

          archive="dist/$asset_name.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_dir" "$archive"
          test -s "$archive"
          echo "asset_path=$archive" >> "$GITHUB_OUTPUT"

      - name: Attach application to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset_path }}
