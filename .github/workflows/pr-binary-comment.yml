name: PR Windows Binary Comment

on:
  workflow_run:
    workflows:
      - PR Windows Binary
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: pr-windows-binary-comment-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  comment:
    name: Comment PR review binary link
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Comment artifact link on PR
        uses: actions/github-script@v7
        env:
          MARKER: '<!-- pr-windows-binary-artifact -->'
        with:
          script: |
            const marker = process.env.MARKER;
            const run = context.payload.workflow_run;
            const pullRequest = run.pull_requests[0];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pullRequest.number;

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: run.id,
              per_page: 100,
            });

            const artifact = artifacts.artifacts.find((item) =>
              item.name.startsWith(`launchpad-windows-pr-${issue_number}-`)
            );

            if (!artifact) {
              core.info(`No PR review binary artifact found for run ${run.id}. Skipping comment.`);
              return;
            }

            const artifactUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${run.id}/artifacts/${artifact.id}`;
            const runUrl = run.html_url;
            const shortSha = run.head_sha.slice(0, 7);

            const body = [
              marker,
              '✅ Windows review binary has been built.',
              '',
              `- Artifact: [${artifact.name}](${artifactUrl})`,
              `- Workflow run: [PR Windows Binary](${runUrl})`,
              `- Commit: \`${shortSha}\``,
              '- Retention: 7 days',
              '',
              'This is a temporary PR review artifact, not an official release.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
