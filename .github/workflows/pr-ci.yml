name: PR CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.89.0
  TARGET: x86_64-pc-windows-msvc

jobs:
  rust:
    name: Rust checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal
          rustup component add clippy rustfmt --toolchain $env:RUST_VERSION
          rustup default $env:RUST_VERSION

      - name: Restore GitHub target cache
        id: target-cache
        uses: actions/cache/restore@v4
        with:
          path: target
          key: windows-target-${{ env.TARGET }}-rust-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'src/**/*.rs', 'src/**/*.wgsl', 'assets/shaders/**/*.wgsl', '.github/workflows/pr-ci.yml') }}
          restore-keys: |
            windows-target-${{ env.TARGET }}-rust-${{ env.RUST_VERSION }}-

      - name: Install sccache
        if: steps.target-cache.outputs.cache-hit != 'true' && vars.R2_SCCACHE_BUCKET != '' && vars.R2_ACCOUNT_ID != ''
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable R2 sccache on GitHub cache miss
        id: r2-sccache
        if: steps.target-cache.outputs.cache-hit != 'true' && vars.R2_SCCACHE_BUCKET != '' && vars.R2_ACCOUNT_ID != ''
        shell: pwsh
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:R2_ACCESS_KEY_ID) -or [string]::IsNullOrWhiteSpace($env:R2_SECRET_ACCESS_KEY)) {
            "R2 credentials are not configured; skipping R2 sccache."
            "enabled=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
          $prefix = "windows-launchpad-rust/$env:TARGET/rust-$env:RUST_VERSION/debug/"
          $endpoint = "https://${{ vars.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          "Using R2 sccache prefix after GitHub target cache miss: $prefix"
          "RUSTC_WRAPPER=sccache" >> $env:GITHUB_ENV
          "SCCACHE_BUCKET=${{ vars.R2_SCCACHE_BUCKET }}" >> $env:GITHUB_ENV
          "SCCACHE_REGION=auto" >> $env:GITHUB_ENV
          "SCCACHE_ENDPOINT=$endpoint" >> $env:GITHUB_ENV
          "SCCACHE_S3_KEY_PREFIX=$prefix" >> $env:GITHUB_ENV
          "SCCACHE_S3_USE_SSL=true" >> $env:GITHUB_ENV
          "SCCACHE_IGNORE_SERVER_IO_ERROR=1" >> $env:GITHUB_ENV
          "AWS_ACCESS_KEY_ID=$env:R2_ACCESS_KEY_ID" >> $env:GITHUB_ENV
          "AWS_SECRET_ACCESS_KEY=$env:R2_SECRET_ACCESS_KEY" >> $env:GITHUB_ENV
          "enabled=true" >> $env:GITHUB_OUTPUT

      - name: Cache Cargo registry and git sources
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Build
        run: cargo build --locked

      - name: Show sccache stats
        if: always() && steps.r2-sccache.outputs.enabled == 'true'
        run: sccache --show-stats

      - name: Save GitHub target cache
        if: success() && steps.target-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: target
          key: ${{ steps.target-cache.outputs.cache-primary-key }}
