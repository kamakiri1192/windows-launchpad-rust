name: PR CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.89.0
  TARGET: x86_64-pc-windows-msvc
  TARGET_CACHE_PATH: target

jobs:
  rust:
    name: Rust checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal
          rustup component add clippy rustfmt --toolchain $env:RUST_VERSION
          rustup default $env:RUST_VERSION

      - name: Restore R2 target cache
        id: target-cache
        uses: ./.github/actions/r2-target-cache
        with:
          mode: restore
          path: ${{ env.TARGET_CACHE_PATH }}
          key: windows-launchpad-rust/target-cache/debug/${{ env.TARGET }}/rust-${{ env.RUST_VERSION }}/${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs') }}.tar.zst
          restore-prefix: windows-launchpad-rust/target-cache/debug/${{ env.TARGET }}/rust-${{ env.RUST_VERSION }}/
          r2-account-id: ${{ vars.R2_ACCOUNT_ID }}
          r2-bucket: ${{ vars.R2_SCCACHE_BUCKET }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Enable R2 sccache
        id: r2-sccache
        uses: ./.github/actions/setup-r2-sccache
        with:
          cache-hit: ${{ steps.target-cache.outputs.cache-hit }}
          profile: debug
          rust-version: ${{ env.RUST_VERSION }}
          target: ${{ env.TARGET }}
          r2-account-id: ${{ vars.R2_ACCOUNT_ID }}
          r2-bucket: ${{ vars.R2_SCCACHE_BUCKET }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Cache Cargo registry and git sources
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Build
        run: cargo build --locked

      - name: Show sccache stats
        if: always() && steps.r2-sccache.outputs.enabled == 'true'
        run: sccache --show-stats

      - name: Save R2 target cache
        if: success() && steps.target-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/r2-target-cache
        with:
          mode: save
          path: ${{ env.TARGET_CACHE_PATH }}
          key: windows-launchpad-rust/target-cache/debug/${{ env.TARGET }}/rust-${{ env.RUST_VERSION }}/${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs') }}.tar.zst
          restore-prefix: windows-launchpad-rust/target-cache/debug/${{ env.TARGET }}/rust-${{ env.RUST_VERSION }}/
          r2-account-id: ${{ vars.R2_ACCOUNT_ID }}
          r2-bucket: ${{ vars.R2_SCCACHE_BUCKET }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
